spring.application.name=apiGateway
server.port=8090

# Ruta para Mascotas
spring.cloud.gateway.routes[0].id=mascotas-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/mascotas/**

# Ruta para Usuarios
spring.cloud.gateway.routes[1].id=usuarios-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[1]=Path=/api/usuarios/**

# Ruta para Reportes
spring.cloud.gateway.routes[2].id=reportes-services
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[2]=Path=/api/reportes/**