spring.application.name=reporte
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reporte}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8083
mascota.service.url=${MASCOTA_SERVICE_URL:http://localhost:8081}
usuario.service.url=${USUARIO_SERVICE_URL:http://localhost:8082}
